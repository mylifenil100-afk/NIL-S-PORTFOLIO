<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinema Theater Room</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Responsive Wrapper */
        #theater-wrapper {
            position: relative;
            width: 1024px;
            height: 576px;
            transform-origin: center center;
        }

        /* Theater Main Frame Container */
        #theater-container {
             position: relative;
            width: 1024px;
            height: 576px;
            background-image: url('cinema bg.png'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border: 4px solid #222;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            
        }

        /* FIXED OVERLAY BOUNDS */
        #screen-overlay {
            position: absolute;
            top: 7.81%;    /* Percentage based calculation for flexible scale */
            left: 19.43%;  
            width: 60.93%;  
            height: 45.65%; 
            background-color: #000;
            overflow: hidden;   
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100% !important;
            height: 100% !important;
            object-fit: fill; 
            border: none;
            outline: none;
        }

        /* Leave Cinema Red Button */
        #back-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: 2px solid #ff4d4d;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(255,0,0,0.5);
        }

        #back-btn:hover {
            background: #dc3545;
            box-shadow: 0 0 15px #ff4d4d;
            transform: translateX(-50%) scale(1.05);
        }
    </style>
</head>
<body>

    <div id="theater-wrapper">
        <div id="theater-container">
            <div id="screen-overlay">
                <video autoplay loop muted playsinline>
                    <source src="movie.mp4" type="video/mp4">
                    Aapka browser is video ko support nahi karta.
                </video>
            </div>
            <a href="index.html" id="back-btn">EXIT</a>
        </div>
    </div>

    <script>
        // Auto-scaling engine for mobile viewports
        function resizeTheater() {
            const wrapper = document.getElementById('theater-wrapper');
            const targetWidth = 1024;
            const targetHeight = 576;
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Calculate scale factors
            const scaleX = windowWidth / targetWidth;
            const scaleY = windowHeight / targetHeight;
            const scale = Math.min(scaleX, scaleY, 1); // Clamp to maximum original scale of 1
            
            wrapper.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', resizeTheater);
        window.addEventListener('load', resizeTheater);
    </script>
</body>
</html>
