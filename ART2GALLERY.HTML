<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Art Gallery with Background Music & Exit</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Mobile par long press text selection rokne ke liye */
            -webkit-user-select: none;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Game Container setup based on your layout */
        #game-container {
            position: relative;
            width: 1024px;
            height: 576px;
            background-image: url('bg22.png'); 
            background-size: cover;
            background-position: center;
            border: 4px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }


        /* Buttons container: Fully responsive mapping */
        .controls-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Alternative modern dynamic gap structure */
        }

        /* Buttons responsive behavior */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none; 
            white-space: nowrap;
        }

        .btn:hover {
            background-color: #fff;
            color: #000;
            transform: scale(1.05);
        }

        .exit-btn:hover {
            background-color: #ff4d4d;
            border-color: #ff4d4d;
            color: #fff;
        }

        /* Mobile specific font and sizing compression */
        @media (max-width: 600px) {
            .btn {
                padding: 10px 18px;
                font-size: 13px;
            }
            .controls-container {
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop autoplay>
        <source src="music1.mp3" type="audio/mpeg">
        Aapka browser audio support nahi karta hai.
    </audio>

    <div class="controls-container">
        <button class="btn" id="musicBtn">🎵 Play Music</button>
        <a href="index.html" class="btn exit-btn">🚪 EXIT</a>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

        // Music play/pause logic
        btn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏸️ Pause Music";
            } else {
                music.pause();
                btn.innerHTML = "🎵 Play Music";
            }
        });

        // Autoplay verification
        window.addEventListener('load', () => {
            if (!music.paused) {
                btn.innerHTML = "⏸️ Pause Music";
            }
        });
    </script>

</body>
</html>
